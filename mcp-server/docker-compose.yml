version: '3.8'

services:
  atrius-docs-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: atrius-docs-mcp-server
    ports:
      - "3001:3001"
    environment:
      # Pinecone configuration
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-atrius-docs}
      - PINECONE_NAMESPACE=${PINECONE_NAMESPACE:-docs}
      
      # Server configuration
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3001
      
      # Search configuration
      - DEFAULT_TOP_K=5
      - MAX_TOP_K=20
      - ENABLE_RERANKING=true
    volumes:
      # Mount .env file for local development
      - ./.env:/app/.env:ro
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mcp-network:
    driver: bridge

# For production, you might want to add:
# - Volume mounts for persistent logs
# - External networks for connecting to other services
# - Resource limits (memory, CPU)
# Example:
#     deploy:
#       resources:
#         limits:
#           memory: 512M
#           cpus: '0.5'
#         reservations:
#           memory: 256M
#           cpus: '0.25' 